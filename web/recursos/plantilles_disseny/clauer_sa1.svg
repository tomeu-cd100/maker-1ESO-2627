<?xml version="1.0" encoding="UTF-8"?>
<!-- Plantilla clauer SA1 - Aula Maker. Unitats en mm.
     CONVENCIÓ DE CAPES:
       - TALL  = traç vermell (#FF0000), sense ompliment, gruix de línia mínim (0.1 mm).
       - GRAVAT = negre (#000000).
     A xTool Creative Space / Inkscape: assigna TALL als contorns vermells i GRAVAT als elements negres. -->
<svg xmlns="http://www.w3.org/2000/svg" width="60mm" height="25mm"
     viewBox="0 0 60 25">
  <!-- ===== CAPA TALL (vermell) ===== -->
  <g id="TALL" fill="none" stroke="#FF0000" stroke-width="0.1">
    <!-- Contorn del clauer -->
    <rect x="0.5" y="0.5" width="59" height="24" rx="4" ry="4"/>
    <!-- Forat per a l'anella -->
    <circle cx="6" cy="6" r="2.5"/>
  </g>
  <!-- ===== CAPA GRAVAT (negre) ===== -->
  <g id="GRAVAT" fill="#000000" stroke="none">
    <!-- Substitueix aquest text pel teu nom -->
    <text x="32" y="16" font-family="sans-serif" font-size="9"
          text-anchor="middle">NOM</text>
  </g>
</svg>
