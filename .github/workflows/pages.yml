name: Construeix i publica la web a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instal·la dependències
        run: pip install markdown
      - name: Verifica els enllaços dels .md
        run: python verifica_enllacos.py
      - name: Verifica la coherència competencial (matriu ↔ SA)
        run: python verifica_competencies.py
      - name: Genera la web des dels .md
        run: python build_web.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
