<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 296" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Exemple SA7: tour 360 navegable — 4 escenes enllaçades en bucle -->
  <defs>
    <style>
      .card{fill:#fff;stroke:#2b2318;stroke-width:2;}
      .band{fill:#eef2f7;}
      .t{fill:#2b2318;font-size:14px;font-weight:700;text-anchor:middle;}
      .n{fill:#e8641b;font-size:12px;font-weight:800;}
      .arrow{stroke:#e8641b;stroke-width:2.5;fill:none;}
      .lbl{fill:#6b5d4b;font-size:12px;text-anchor:middle;}
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#e8641b"/>
    </marker>
  </defs>

  <!-- Escena 1 Entrada (dalt-esq) -->
  <g>
    <rect class="card" x="40" y="40" width="150" height="86" rx="8"/>
    <rect class="band" x="40" y="40" width="150" height="30" rx="8"/>
    <text x="55" y="60" class="n">1</text>
    <text x="115" y="60" class="t">Entrada</text>
    <circle cx="115" cy="98" r="17" fill="none" stroke="#8bbad1" stroke-width="3"/>
    <path d="M98,98 h34 M115,81 v34" stroke="#8bbad1" stroke-width="2"/>
    <text x="115" y="118" class="lbl">360°</text>
  </g>
  <!-- Escena 2 Pati (dalt-dreta) -->
  <g>
    <rect class="card" x="270" y="40" width="150" height="86" rx="8"/>
    <rect class="band" x="270" y="40" width="150" height="30" rx="8"/>
    <text x="285" y="60" class="n">2</text>
    <text x="345" y="60" class="t">Pati</text>
    <circle cx="345" cy="98" r="17" fill="none" stroke="#a7d29a" stroke-width="3"/>
    <path d="M328,98 h34 M345,81 v34" stroke="#a7d29a" stroke-width="2"/>
    <text x="345" y="118" class="lbl">360°</text>
  </g>
  <!-- Escena 3 Aula Maker (baix-dreta) -->
  <g>
    <rect class="card" x="270" y="196" width="150" height="86" rx="8"/>
    <rect class="band" x="270" y="196" width="150" height="30" rx="8"/>
    <text x="285" y="216" class="n">3</text>
    <text x="348" y="216" class="t">Aula Maker</text>
    <circle cx="345" cy="254" r="17" fill="none" stroke="#e8934f" stroke-width="3"/>
    <path d="M328,254 h34 M345,237 v34" stroke="#e8934f" stroke-width="2"/>
    <text x="345" y="274" class="lbl">360° ⭐</text>
  </g>
  <!-- Escena 4 Biblioteca (baix-esq) -->
  <g>
    <rect class="card" x="40" y="196" width="150" height="86" rx="8"/>
    <rect class="band" x="40" y="196" width="150" height="30" rx="8"/>
    <text x="55" y="216" class="n">4</text>
    <text x="118" y="216" class="t">Biblioteca</text>
    <circle cx="115" cy="254" r="17" fill="none" stroke="#c49bd6" stroke-width="3"/>
    <path d="M98,254 h34 M115,237 v34" stroke="#c49bd6" stroke-width="2"/>
    <text x="115" y="274" class="lbl">360°</text>
  </g>

  <!-- fletxes de navegació en bucle -->
  <line class="arrow" x1="190" y1="83" x2="266" y2="83" marker-end="url(#ah)"/>
  <line class="arrow" x1="345" y1="126" x2="345" y2="192" marker-end="url(#ah)"/>
  <line class="arrow" x1="270" y1="239" x2="194" y2="239" marker-end="url(#ah)"/>
  <line class="arrow" x1="115" y1="196" x2="115" y2="130" marker-end="url(#ah)"/>

  <text x="230" y="162" class="lbl" font-weight="700" fill="#2b2318">punts de navegació ↻</text>
</svg>
