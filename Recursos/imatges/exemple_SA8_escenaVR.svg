<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 272" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Exemple SA8: escena VR "Sistema Solar" a CoSpaces -->
  <defs>
    <style>
      .lbl{fill:#dfe6ef;font-size:13px;} .lblb{fill:#fff;font-size:13px;font-weight:700;}
      .card{fill:#2b2318;stroke:#e8641b;stroke-width:2;}
      .panel{fill:#fbe7d3;stroke:#2b2318;stroke-width:1.5;}
      .lead{stroke:#e8a06b;stroke-width:1.5;stroke-dasharray:3 3;fill:none;}
    </style>
    <radialGradient id="sky" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#2a2b52"/><stop offset="100%" stop-color="#14142a"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe08a"/><stop offset="100%" stop-color="#f5a623"/>
    </radialGradient>
  </defs>

  <!-- fons de la sala VR -->
  <rect x="20" y="20" width="420" height="240" rx="10" fill="url(#sky)" stroke="#2b2318" stroke-width="2"/>

  <!-- estrelles -->
  <g fill="#fff">
    <circle cx="70" cy="60" r="1.5"/><circle cx="140" cy="45" r="1"/><circle cx="380" cy="70" r="1.5"/>
    <circle cx="410" cy="150" r="1"/><circle cx="60" cy="200" r="1"/><circle cx="330" cy="210" r="1.5"/>
    <circle cx="200" cy="40" r="1"/><circle cx="270" cy="230" r="1"/>
  </g>

  <!-- òrbites -->
  <ellipse cx="230" cy="140" rx="70" ry="42" fill="none" stroke="#4a4b6b" stroke-width="1"/>
  <ellipse cx="230" cy="140" rx="120" ry="72" fill="none" stroke="#4a4b6b" stroke-width="1"/>
  <ellipse cx="230" cy="140" rx="170" ry="100" fill="none" stroke="#4a4b6b" stroke-width="1"/>

  <!-- Sol -->
  <circle cx="230" cy="140" r="26" fill="url(#sun)"/>
  <text x="230" y="144" text-anchor="middle" fill="#7a4a12" font-size="11" font-weight="800">SOL</text>

  <!-- planetes -->
  <circle cx="300" cy="140" r="8" fill="#8bbad1"/>
  <circle cx="350" cy="140" r="11" fill="#c96f4a"/>
  <circle cx="160" cy="140" r="9" fill="#a7d29a"/>
  <circle cx="230" cy="240" r="10" fill="#c49bd6"/>

  <!-- panell d'entrada -->
  <g>
    <rect class="panel" x="40" y="34" width="150" height="26" rx="4"/>
    <text x="50" y="51" fill="#2b2318" font-size="11" font-weight="700">Benvinguts al Sistema Solar</text>
  </g>

  <!-- interacció: cursor + tooltip -->
  <g>
    <path d="M348,152 l0,26 l6,-6 l5,10 l4,-2 l-5,-10 l8,0 z" fill="#fff" stroke="#2b2318" stroke-width="1.2"/>
    <rect class="panel" x="352" y="176" width="86" height="30" rx="4"/>
    <text x="360" y="189" fill="#2b2318" font-size="10" font-weight="700">Mart</text>
    <text x="360" y="201" fill="#6b5d4b" font-size="9">clic → nom + dada</text>
  </g>

</svg>
