<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Exemple SA9: estand "Viatge a la Lluna" — integra 3D + làser + 360/VR -->
  <defs>
    <style>
      .ink{stroke:#2b2318;stroke-width:2;stroke-linejoin:round;}
      .t{fill:#2b2318;font-size:13px;font-weight:700;}
      .lbl{fill:#6b5d4b;font-size:12px;}
      .tag{fill:#fff;stroke:#e8641b;stroke-width:1.5;}
      .tagt{fill:#e8641b;font-size:11px;font-weight:700;}
    </style>
  </defs>

  <!-- taula de l'estand -->
  <rect class="ink" x="40" y="210" width="380" height="18" rx="3" fill="#e8934f"/>
  <rect class="ink" x="60" y="228" width="16" height="60" fill="#d97e38"/>
  <rect class="ink" x="384" y="228" width="16" height="60" fill="#d97e38"/>

  <!-- rètol de l'estand -->
  <rect class="ink" x="120" y="26" width="220" height="34" rx="6" fill="#2b2318"/>
  <text x="230" y="49" text-anchor="middle" fill="#ffe08a" font-size="15" font-weight="800">VIATGE A LA LLUNA</text>

  <!-- maqueta de la Lluna (3D) -->
  <g>
    <circle class="ink" cx="120" cy="165" r="34" fill="#cfcfd6"/>
    <circle cx="108" cy="155" r="6" fill="#b3b3bd"/><circle cx="130" cy="172" r="4" fill="#b3b3bd"/>
    <circle cx="128" cy="150" r="3" fill="#b3b3bd"/>
    <rect class="tag" x="86" y="205" width="72" height="18" rx="9"/>
    <text x="92" y="218" class="tagt">🌙 3D</text>
  </g>

  <!-- cohet gravat a làser -->
  <g>
    <path class="ink" d="M230,120 q14,0 14,26 l0,40 l-28,0 l0,-40 q0,-26 14,-26 z" fill="#f4b183"/>
    <polygon class="ink" points="216,186 205,206 216,200"/>
    <polygon class="ink" points="244,186 255,206 244,200"/>
    <circle cx="230" cy="150" r="7" fill="#8bbad1" stroke="#2b2318" stroke-width="1.5"/>
    <rect class="tag" x="196" y="205" width="80" height="18" rx="9"/>
    <text x="202" y="218" class="tagt">🚀 làser</text>
  </g>

  <!-- pantalla amb tour 360 / VR -->
  <g>
    <rect class="ink" x="322" y="120" width="82" height="60" rx="5" fill="#14142a"/>
    <circle cx="363" cy="150" r="18" fill="none" stroke="#7fd0e6" stroke-width="3"/>
    <path d="M345,150 h36 M363,132 v36" stroke="#7fd0e6" stroke-width="2"/>
    <rect class="ink" x="352" y="180" width="22" height="8" fill="#4a4030"/>
    <rect class="tag" x="318" y="205" width="92" height="18" rx="9"/>
    <text x="324" y="218" class="tagt">🥽 tour 360</text>
  </g>

  <!-- cartells informatius -->
  <rect class="ink" x="150" y="150" width="30" height="40" rx="3" fill="#fbe7d3"/>
  <line x1="156" y1="160" x2="174" y2="160" stroke="#6b5d4b"/>
  <line x1="156" y1="168" x2="174" y2="168" stroke="#6b5d4b"/>
  <line x1="156" y1="176" x2="168" y2="176" stroke="#6b5d4b"/>

  <!-- integració -->
  <text x="40" y="280" class="t">Integra 3 tecnologies del curs:</text>
  <text x="40" y="298" class="lbl">objecte imprès en 3D + peça tallada a làser + experiència immersiva 360/VR</text>
</svg>
