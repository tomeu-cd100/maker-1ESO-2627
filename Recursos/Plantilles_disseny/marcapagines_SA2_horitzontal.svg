<?xml version="1.0" encoding="UTF-8"?>
<!-- Marcapàgines SA2 en orientació HORITZONTAL (només per il·lustrar; el vectorial de tall
     és marcapagines_SA2.svg, vertical). TALL = vermell; GRAVAT = negre. -->
<svg xmlns="http://www.w3.org/2000/svg" width="150mm" height="50mm" viewBox="0 0 150 50">
  <g transform="translate(0,50) rotate(-90)">
    <!-- ===== CAPA TALL (vermell) ===== -->
    <g id="TALL" fill="none" stroke="#FF0000" stroke-width="0.3">
      <rect x="0.5" y="0.5" width="49" height="149" rx="6" ry="6"/>
      <!-- Forat per a la borla -->
      <circle cx="25" cy="8" r="2.5"/>
    </g>
    <!-- ===== CAPA GRAVAT (negre) ===== -->
    <g id="GRAVAT" fill="#000000" stroke="none">
      <rect x="5" y="16" width="40" height="128" rx="4" ry="4"
            fill="none" stroke="#000000" stroke-width="0.6"/>
      <text x="25" y="85" font-family="serif" font-size="8"
            text-anchor="middle" transform="rotate(90 25 85)">EL TEU MISSATGE</text>
      <circle cx="25" cy="40" r="12" fill="none" stroke="#000000" stroke-width="0.6"/>
      <text x="25" y="41" font-family="sans-serif" font-size="3.5"
            text-anchor="middle" transform="rotate(90 25 40)">imatge aquí</text>
    </g>
  </g>
</svg>
