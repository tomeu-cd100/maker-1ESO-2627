<?xml version="1.0" encoding="UTF-8"?>
<!-- Exemple resolt de clauer SA1 - Aula Maker. Nom: CATALINA. Unitats en mm.
     CONVENCIÓ DE CAPES:
       - TALL   = traç vermell (#FF0000), sense ompliment, gruix de línia 0.1 mm.
       - GRAVAT = negre (#000000).
     A xTool Creative Space / Inkscape: assigna TALL als contorns vermells i GRAVAT als negres.
     ⚠️ Abans de fabricar: selecciona el text i fes «Objecte → Objecte a camí» per no dependre de la font. -->
<svg xmlns="http://www.w3.org/2000/svg" width="60mm" height="25mm" viewBox="0 0 60 25">

  <!-- ===== CAPA TALL (vermell) ===== -->
  <g id="TALL" fill="none" stroke="#FF0000" stroke-width="0.1">
    <!-- Contorn del clauer (rectangle arrodonit) -->
    <rect x="0.5" y="0.5" width="59" height="24" rx="4" ry="4"/>
    <!-- Forat per a l'anella (Ø 5 mm, a ≥3 mm de la vora) -->
    <circle cx="6" cy="12.5" r="2.5"/>
  </g>

  <!-- ===== CAPA GRAVAT (negre) ===== -->
  <g id="GRAVAT" fill="#000000" stroke="none">
    <!-- Marc decoratiu gravat -->
    <rect x="2.7" y="2.7" width="54.6" height="19.6" rx="3" ry="3"
          fill="none" stroke="#000000" stroke-width="0.3"/>
    <!-- Nom -->
    <text x="35" y="14.6" font-family="Arial, sans-serif" font-weight="bold"
          font-size="7" letter-spacing="0.3" text-anchor="middle">Catalina</text>
    <!-- Floritura sota el nom -->
    <path d="M22 17.6 Q35 20 48 17.6" fill="none" stroke="#000000" stroke-width="0.35"/>
    <!-- Detall: estrella (forma vectorial real) -->
    <path transform="translate(51.5 7) scale(1.8)"
          d="M0,-1 L0.224,-0.309 L0.951,-0.309 L0.363,0.118 L0.588,0.809 L0,0.382 L-0.588,0.809 L-0.363,0.118 L-0.951,-0.309 L-0.224,-0.309 Z"/>
  </g>
</svg>
